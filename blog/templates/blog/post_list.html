{% extends 'blog/base.html' %}
{% block content %}
<h2 style="margin-bottom:1.5rem; color:#0c4b33;">პოსტები <span class="badge">{{ posts.count }}</span></h2>
{% for post in posts %}
<div style="background:white; border-radius:10px; padding:1.5rem; margin-bottom:1rem; border-left:4px solid #44b78b; box-shadow:0 2px 8px rgba(0,0,0,0.06);">
  <h3 style="margin-bottom:0.4rem;">
    <a href="{% url 'post-detail' post.pk %}" style="color:#0c4b33; text-decoration:none;">{{ post.title }}</a>
  </h3>
  <p style="color:#6b7280; font-size:0.85rem; margin-bottom:0.8rem;">✍️ {{ post.author }} &nbsp;|&nbsp; 🕒 {{ post.created_at|date:"d M Y" }}</p>
  <p style="color:#374151;">{{ post.content|truncatechars:140 }}</p>
  <a href="{% url 'post-detail' post.pk %}" style="display:inline-block; margin-top:0.8rem; color:#44b78b; font-size:0.9rem;">წაიკითხე მეტი →</a>
</div>
{% empty %}
<p>პოსტები არ არის.</p>
{% endfor %}
{% endblock %}
