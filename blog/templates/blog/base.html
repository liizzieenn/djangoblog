<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>Django Blog</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f4f7f4; color: #1a1a2e; }
  nav { background: #0c4b33; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
  nav h1 { color: #44b78b; font-size: 1.4rem; }
  nav span { color: #a8d8c0; font-size: 0.9rem; }
  .container { max-width: 860px; margin: 2rem auto; padding: 0 1rem; }
  .badge { background: #44b78b; color: white; padding: 2px 10px; border-radius: 12px; font-size: 0.75rem; }
</style>
</head>
<body>
<nav>
  <h1>🐍 Django Blog</h1>
  <span>demo პროექტი</span>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
